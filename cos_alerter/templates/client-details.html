<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="stylesheet" href="/static/vanilla-framework-version-3.14.0.min.css" />
</head>

<body>
  <header id="navigation" class="p-navigation is-dark">
    <div class="p-navigation__row">
      <div class="p-navigation__banner">
        <div class="p-navigation__tagged-logo">
          <a class="p-navigation__link" href="#">
            <div class="p-navigation__logo-tag">
              <img class="p-navigation__logo-icon" src="https://assets.ubuntu.com/v1/82818827-CoF_white.svg" alt="">
            </div>
            <span class="p-navigation__logo-title" id="nav">
              COS Alerter
            </span>
          </a>
        </div>
      </div>
    </div>
  </header>

  <div class="p-strip">

    <div class="row">
      <div class="col12">
        <h2>{{ client["client_name"] }}</h2>
      </div>
    </div>

    <div class="row">
      <div class="col12">
        <h3>Silencing</h3>
        <p>Prevent notifications from being sent.</p>

        <form action="/silence/{{client['client_id']}}" method="POST">
            <label for="silence-duration-h">Silence duration (hours):</label>
            <input type="number" id="silence-duration-h" name="silence-duration-h" step="1" min="0" size="3" required>
            
            <label for="client-key">Client Key:</label>
            <input type="password" id="client-key" name="client-key" required>

            <button type="submit">Submit</button>
        </form>
      </div>
    </div>


  </div>
</body>

</html>
